general {
    disable_loading_bar = false
    grace = 0  # Lock immediately
    hide_cursor = false  # Show cursor for debugging
    no_fade_in = false
}

# --- Background Settings (Blur + One Dark tint) ---
background {
    monitor =
    path = $HOME/Pictures/wallpapers/blur.png
    blur_size = 4
    blur_passes = 3
    noise = 0.0117
    contrast = 1.3000
    brightness = 0.8000
    vibrancy = 0.2100
    vibrancy_darkness = 0.0
    color = rgba(40, 44, 52, 0.9)  # One Dark base background tint
}

# --- Time (Hours) ---
label {
    monitor =
    text = cmd[update:1000] echo "<b><big> $(date +"%H") </big></b>"
    color = rgb(255,255,255)  # One Dark blue (61AFEF)
    font_size = 112
    font_family = JetBrainsMono Nerd Mono
    shadow_passes = 3
    shadow_size = 4
    position = 0, 220
    halign = center
    valign = center
}

# --- Time (Minutes) ---
label {
    monitor =
    text = cmd[update:1000] echo "<b><big> $(date +"%M") </big></b>"
    color = rgb(255,255,255)  # One Dark red (E06C75)
    font_size = 112
    font_family = JetBrainsMono Nerd Mono
    shadow_passes = 3
    shadow_size = 4
    position = 0, 80
    halign = center
    valign = center
}

# --- Day of Week ---
label {
    monitor =
    text = cmd[update:18000000] echo "<b><big> "$(date +'%A')" </big></b>"
    color =  rgb(255,255,255)# One Dark green (98C379)
    font_size = 22
    font_family = JetBrainsMono Nerd Font
    position = 0, -30
    halign = center
    valign = center
}

# --- Date (Day + Month) ---
label {
    monitor =
    text = cmd[update:18000000] echo "<b> "$(date +'%d %b')" </b>"
    color =  rgb(255,255,255)  # One Dark orange (D19A66)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, -100
    halign = center
    valign = center
}

# --- Weather ---
label {
    monitor =
    text = cmd[update:18000000] echo "<b>Feels like<big> $(curl -s 'wttr.in?format=%t' | tr -d '+') </big></b>"
    color = rgb(171, 178, 191)  # One Dark foreground (ABB2BF)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, 120
    halign = center
    valign = bottom
}

# --- Password Input ---
input-field {
    monitor =
    size = 300, 50  # Slightly wider for 1080p
    outline_thickness = 3
    dots_size = 0.26
    dots_spacing = 0.64
    dots_center = true
    rounding = 22

    outer_color = rgb(40, 44, 52)  # One Dark background
    inner_color = rgb(62, 68, 81)  # Darker variant (3E4451)
    font_color = rgb(171, 178, 191)  # Foreground (ABB2BF)
    
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false  # Set to 'true' for dots-only

    position = 0, -280  # Adjusted for 1080p (centered vertically)
    halign = center
    valign = center
}
